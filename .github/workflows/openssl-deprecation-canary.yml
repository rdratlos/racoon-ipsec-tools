# .github/workflows/openssl-deprecation-canary.yml
#
# OpenSSL 4.0 readiness canary.
#
# Compiles selected source files against a "no deprecated symbols"
# configuration (OPENSSL_API_COMPAT=0x40000000L + OPENSSL_NO_DEPRECATED),
# which makes deprecated declarations disappear from the OpenSSL headers
# entirely -- simulating their removal in OpenSSL 4.0.
#
# IMPORTANT: This is scoped to specific files, NOT the whole tree.
#   - openssl_compat.c is the deliberate containment point for deprecated
#     calls and is EXEMPT -- it is expected to break under 4.0 by design.
#
# Two checks with different intent:
#   1. Regression guard (crypto_openssl.o): expected GREEN today. If it goes
#      red, a direct deprecated call was reintroduced into the daemon. Real
#      alarm -> this step is allowed to fail the job (blocking).
#   2. Readiness tracker (plainrsa-gen.o): expected RED today (deferred work,
#      see issue). Goes green when the migration lands. Non-blocking until
#      then.

name: OpenSSL Deprecation Canary

permissions:
  contents: read
  checks: write   # required to publish the dedicated canary check runs

on:
  # No branches: filter — build any branch that gets pushed to, and any PR
  # regardless of its base. The old filters (develop-only for both push and
  # pull_request) silently dropped the canary for any other branch naming
  # convention or PR base (e.g. chore/** PRs into main), matching the same
  # gap fixed in build-test.yml.
  push: {}
  pull_request: {}
  schedule:
    # Weekly: also catches the runner's libssl advancing toward 4.0 over time.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run the canary against (required — no default, so a forgotten value fails fast instead of silently testing develop)'
        required: true

jobs:
  resolve-ref:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Resolve target ref
        id: ref
        run: |
          if [ -n "${{ inputs.branch }}" ]; then
            echo "ref=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.head_ref }}" ]; then
            echo "ref=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref_name || 'develop' }}" >> $GITHUB_OUTPUT
          fi
      - name: Checkout resolved ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
      - name: Resolve target sha
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Report canary target
        run: |
          echo "### Canary target" >> $GITHUB_STEP_SUMMARY
          echo "- branch: \`${{ steps.ref.outputs.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- sha: \`${{ steps.sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY

  canary:
    needs: resolve-ref
    uses: rdratlos/shared-ci/.github/workflows/ccpp-target-compile.yml@main
    with:
      ref: ${{ needs.resolve-ref.outputs.ref }}
      project-deps: 'libssl-dev libfl-dev libkrb5-dev libldap2-dev libpam0g-dev linux-headers-generic libcrypt-dev'
      env-vars: |
        NODEP="-DOPENSSL_API_COMPAT=0x30000000L -DOPENSSL_NO_DEPRECATED"
      configure-command: >
        CPPFLAGS="-Wdate-time -D_FORTIFY_SOURCE=3"
        LDFLAGS="-Wl,-Bsymbolic-functions -flto=auto -ffat-lto-objects -Wl,-z,relro"
        CFLAGS="-g -O2 -Werror=implicit-function-declaration -fno-omit-frame-pointer -mno-omit-leaf-frame-pointer -Wformat -Werror=format-security -fcf-protection -Wno-old-style-definition"
        ./configure --verbose --host=x86_64-linux-gnu --build=x86_64-linux-gnu
        --prefix=/usr --sysconfdir=/etc/racoon --libdir=/usr/lib/ipsec-tools
        --mandir=${prefix}/share/man --infodir=${prefix}/share/info
        --localstatedir=/var/run --enable-shared --disable-static
        --enable-frag --enable-gssapi --enable-hybrid --with-libldap
        --enable-dpd --enable-adminport --with-kernel-headers=/usr/include
        --with-libpam --without-readline --disable-security-context --enable-natt
      targets: >-
        [
          {"name":"guard","label":"Regression guard: crypto_openssl.o","dir":"src/racoon","target":"crypto_openssl.o","cc":"gcc ${NODEP}","blocking":true},
          {"name":"tracker","label":"Readiness tracker: plainrsa-gen.o","dir":"src/racoon","target":"plainrsa-gen.o","cc":"gcc ${NODEP}","blocking":false}
        ]
      artifact-name: openssl-canary-logs

  annotate:
    needs: canary
    runs-on: ubuntu-latest
    steps:
      - name: Annotate readiness status
        run: |
          if [ "${{ needs.canary.outputs.result }}" = "success" ]; then
            echo "::notice title=4.0 Readiness::All tracked checks pass. If the readiness tracker is green, the RSA*->EVP_PKEY migration may be complete -- consider promoting it to a hard gate and closing the migration issue."
          else
            echo "::notice title=4.0 Readiness::See the compile results in the canary job summary. Regression of reintroduced deprecated *calls* is guarded separately by the normal -Werror build."
          fi

  # Publish per-target check runs on the PR's Checks tab, mirroring
  # build-test.yml's publish-tristate job. The reusable workflow only
  # exposes a single JSON `results` output (one entry per target), not
  # per-target named outputs, so it's parsed here instead of guessed at.
  publish-canary-check:
    name: 'Publish canary checks'
    needs: [resolve-ref, canary]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      checks: write

    steps:
      - name: Publish check runs
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ needs.resolve-ref.outputs.ref }}';
            const sha = '${{ needs.resolve-ref.outputs.sha }}' || context.payload.pull_request?.head?.sha || context.sha;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let results = [];
            try {
              results = JSON.parse(`${{ needs.canary.outputs.results || '[]' }}`);
            } catch (e) {
              core.warning(`Failed to parse canary results JSON: ${e}`);
            }

            const guard = results.find(r => r.name === 'guard');
            const tracker = results.find(r => r.name === 'tracker');

            // Regression guard: a real failure here is a genuine alarm, so
            // it is reported as `failure` if it breaks.
            const guardOutcome = guard?.outcome || 'unknown';
            let guardConclusion, guardTitle, guardSummary;
            if (guardOutcome === 'success') {
              guardConclusion = 'success';
              guardTitle = 'No deprecated OpenSSL calls in crypto_openssl.o';
              guardSummary = 'crypto_openssl.o compiled cleanly under the OpenSSL 4.0 "no deprecated symbols" configuration.';
            } else if (guardOutcome === 'failure') {
              guardConclusion = 'failure';
              guardTitle = 'Deprecated OpenSSL call reintroduced';
              guardSummary = 'crypto_openssl.o failed to compile under the OpenSSL 4.0 "no deprecated symbols" configuration — a deprecated call was reintroduced into the daemon.';
            } else {
              guardConclusion = 'neutral';
              guardTitle = 'Regression guard result unavailable';
              guardSummary = 'Could not determine the regression guard outcome for this run.';
            }

            const guardText = [
              `**Branch tested:** \`${branch}\``,
              `**Commit:** \`${sha}\``,
              `**Target compiled:** \`${guard?.target || 'crypto_openssl.o'}\` (in \`src/racoon\`)`,
              '',
              '**Regression guard** — expected GREEN. A failure here is a real alarm: it means a direct deprecated OpenSSL call was reintroduced into the daemon. This check is blocking.',
              '',
              `Outcome: \`${guardOutcome}\``,
              '',
              `[Full workflow run](${runUrl})`
            ].join('\n');

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'CI: OpenSSL 4.0 canary (regression guard)',
              head_sha: sha,
              status: 'completed',
              conclusion: guardConclusion,
              output: { title: guardTitle, summary: guardSummary, text: guardText }
            });

            // Readiness tracker: informational only. It is expected to be
            // RED until the RSA*->EVP_PKEY migration lands, so it must
            // never report `failure` — only `success` or `neutral`.
            const trackerOutcome = tracker?.outcome || 'unknown';
            let trackerConclusion, trackerTitle, trackerSummary;
            if (trackerOutcome === 'success') {
              trackerConclusion = 'success';
              trackerTitle = 'OpenSSL 4.0 readiness: plainrsa-gen.o migrated';
              trackerSummary = 'plainrsa-gen.o now compiles cleanly under the OpenSSL 4.0 "no deprecated symbols" configuration — the RSA*->EVP_PKEY migration appears complete.';
            } else {
              trackerConclusion = 'neutral';
              trackerTitle = 'OpenSSL 4.0 readiness: migration pending (informational)';
              trackerSummary = 'plainrsa-gen.o still uses deprecated OpenSSL APIs. This is expected today and does not block this PR.';
            }

            const trackerText = [
              `**Branch tested:** \`${branch}\``,
              `**Commit:** \`${sha}\``,
              `**Target compiled:** \`${tracker?.target || 'plainrsa-gen.o'}\` (in \`src/racoon\`)`,
              '',
              '**Readiness tracker** — informational only, non-blocking. Confirms plainrsa-gen remains free of direct OpenSSL 4.0-incompatible calls. GREEN = tool is 4.0-ready (via openssl_compat). Turns RED if a deprecated call is reintroduced outside the shim boundary.',
              '',
              `Outcome: \`${trackerOutcome}\``,
              '',
              `[Full workflow run](${runUrl})`
            ].join('\n');

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'CI: OpenSSL 4.0 canary (readiness tracker)',
              head_sha: sha,
              status: 'completed',
              conclusion: trackerConclusion,
              output: { title: trackerTitle, summary: trackerSummary, text: trackerText }
            });
